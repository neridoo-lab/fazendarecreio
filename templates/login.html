<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Fazenda Recreio</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* Reset */
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        .login-wrapper {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== CARROSSEL DE FUNDO ===== */
        .slideshow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: fadeAnimation 15s infinite;
        }

        /* ⬇️ TROQUE AQUI PELOS NOMES DAS SUAS IMAGENS ⬇️ */
        .slide1 { background-image: url("{{ url_for('static', filename='images/slide1.png') }}"); animation-delay: 0s; }
        .slide2 { background-image: url("{{ url_for('static', filename='images/slide2.png') }}"); animation-delay: 5s; }
        .slide3 { background-image: url("{{ url_for('static', filename='images/slide3.png') }}"); animation-delay: 10s; }

        @keyframes fadeAnimation {
            0%   { opacity: 0; }
            8%   { opacity: 1; }
            25%  { opacity: 1; }
            33%  { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Overlay escuro para contraste */
        .login-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        /* ===== CARD DE LOGIN ===== */
        .login-card {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 100); /* fundo branco com transparência */
    backdrop-filter: blur(12px);          /* efeito vidro fosco */
    -webkit-backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
}

 .logo-img {
    width: 250px !important;
    max-width: 250px !important;
    height: auto !important;
    max-height: none !important;
    display: block !important;
    margin: 0 auto 15px auto !important;
}

        .subtitle {
            text-align: center;
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2c3e50, #27ae60);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.4);
        }

        .btn-login i {
            margin-right: 8px;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #6c757d;
            border-top: 1px solid #ecf0f1;
            padding-top: 15px;
        }

        .footer p {
            margin: 0;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 576px) {
            .login-card {
                padding: 25px 20px;
            }
            .logo-img {
                max-height: 60px;
            }
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <!-- CARROSSEL -->
    <div class="slideshow">
        <div class="slide slide1"></div>
        <div class="slide slide2"></div>
        <div class="slide slide3"></div>
    </div>

    <!-- CARD DE LOGIN -->
    <div class="login-card">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Fazenda Recreio" class="logo-img">
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'message' else 'info' }} alert-dismissible fade show" role="alert">
                        <i class="fas fa-{% if category == 'success' %}check-circle{% elif category == 'danger' %}exclamation-circle{% elif category == 'warning' %}exclamation-triangle{% else %}info-circle{% endif %}"></i>
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-user"></i> Usuário</label>
                <input type="text" name="usuario" class="form-control" placeholder="Digite seu usuário" required autofocus>
            </div>
            
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-lock"></i> Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="Digite sua senha" required>
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>
        
        <div class="footer">
            <p><i class="fas fa-tractor"></i> Sistema de Gerenciamento de Rebanho</p>
            <p>Versão 2.0</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
