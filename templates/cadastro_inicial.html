{% extends "base.html" %}

{% block content %}

<div class="card-dashboard">
    <h2><i class="fas fa-edit" style="color: #1B5E20;"></i> Cadastro Inicial do Rebanho</h2>
    <p class="subtitle">Defina a quantidade inicial para cada categoria:</p>

    <form method="POST">
        <div class="row g-3">
            {% for categoria, quantidade in dados %}
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label" style="font-weight: 600;">
                        <i class="fas fa-tag"></i> {{ categoria }}
                    </label>
                    <input
                        class="form-control"
                        type="number"
                        name="{{ categoria }}"
                        value="{{ quantidade }}"
                        min="0"
                        required
                        style="border-radius: 10px; padding: 12px 16px; border: 1px solid #d0ddd0; font-size: 16px;">
                </div>
            </div>
            {% endfor %}
        </div>

        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;">
            <button type="submit" class="btn-primary-custom" style="padding: 12px 32px;">
                <i class="fas fa-save"></i> Salvar Cadastro Inicial
            </button>
            <a href="/" class="btn-outline-custom" style="padding: 12px 32px; text-decoration: none;">
                <i class="fas fa-times"></i> Cancelar
            </a>
        </div>
    </form>
</div>

{% endblock %}
